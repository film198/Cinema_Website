<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Movie</title>

<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

header{
padding:20px;
background:#111;
font-size:22px;
font-weight:bold;
}

.player-container{
margin-top:20px;
}

iframe{
width:90%;
height:600px;
border-radius:15px;
border:none;
}

.info{
margin-top:20px;
font-size:18px;
}

.back-btn{
margin-top:20px;
padding:10px 20px;
background:#e50914;
border:none;
color:white;
border-radius:20px;
cursor:pointer;
font-size:16px;
}

.back-btn:hover{
opacity:0.8;
}

</style>

</head>
<body>

<header>
🎬 Cinema Player
</header>

<div class="info" id="movieTitle"></div>

<div class="player-container">
<iframe id="player"></iframe>
</div>

<button class="back-btn" onclick="goBack()">
⬅ Back to Home
</button>

<script>

/*
🔥 نأخذ ID من الرابط:
example:
https://site.com/watch/12345
*/

const pathParts = window.location.pathname.split("/");
const movieId = pathParts[pathParts.length - 1];

if(movieId && movieId !== "watch"){

document.getElementById("movieTitle").innerText =
"Watching Movie ID: " + movieId;

/*
🎥 المشغل
يمكنك تغييره لاحقاً إلى API آخر
حالياً نستخدم 2embed
*/

document.getElementById("player").src =
"https://www.2embed.cc/embed/" + movieId;

}else{

document.getElementById("movieTitle").innerText =
"No Movie Selected";

}

function goBack(){
window.location.href = "/";
}

</script>

</body>
</html>
