<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema 198</title>

<style>

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

/* ===== HERO ===== */

.hero{
height:90vh;
background:linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.4)),
url("images/default.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
}

.hero h1{
font-size:60px;
max-width:600px;
}

.hero p{
margin:20px 0;
opacity:0.8;
}

.hero button{
padding:12px 30px;
border:none;
background:#e50914;
color:white;
font-size:18px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
}

.hero button:hover{
background:#ff1e2d;
transform:scale(1.1);
}

/* ===== SECTION ===== */

.section{
padding:40px 60px;
}

.section h2{
margin-bottom:20px;
}

/* ===== ROW ===== */

.row{
display:flex;
gap:20px;
overflow-x:auto;
}

.row::-webkit-scrollbar{
display:none;
}

/* ===== CARD ===== */

.card{
min-width:220px;
background:#181818;
border-radius:15px;
overflow:hidden;
transition:0.4s;
position:relative;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card:hover{
transform:scale(1.05);
}

.card h3{
padding:10px;
font-size:16px;
}

.card a{
display:block;
text-align:center;
background:red;
color:white;
padding:10px;
text-decoration:none;
}

/* ===== ADS ===== */

.ads-container{
text-align:center;
margin:50px 0;
}

</style>
</head>

<body>

<!-- 🔥 ADS TOP -->
<div class="ads-container">
<script async="async" data-cfasync="false"
src="https://pl28827264.effectivegatecpm.com/cbb1eb3e15d6bc5983da5d34fb7c0d8c/invoke.js">
</script>
<div id="container-cbb1eb3e15d6bc5983da5d34fb7c0d8c"></div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Experience Cinema Like Never Before</h1>
<p>Watch the latest movies in high quality.</p>
</div>

<!-- 🔥 ADS BANNER BETWEEN CONTENT -->
<div class="ads-container">
<script async="async" data-cfasync="false"
src="https://pl28827264.effectivegatecpm.com/cbb1eb3e15d6bc5983da5d34fb7c0d8c/invoke.js">
</script>
<div id="container-cbb1eb3e15d6bc5983da5d34fb7c0d8c"></div>
</div>

<div id="content"></div>

<script>

/* ===== SMART LINK ===== */

let smartLink = "https://www.effectivegatecpm.com/es8hkke7?key=f44396473515f3318c23f3ce36dbf199";

function openAd(realLink){

// فتح الإعلان أولاً
window.open(smartLink, "_blank");

// بعد ثانيتين يذهب للفيلم
setTimeout(()=>{
window.location.href = realLink;
},2000);

}

/* ===== LOAD MOVIES ===== */

fetch("movies.json?v="+Date.now())
.then(res=>res.json())
.then(data=>{

let html="";
let categories=["Popular","Top Rated","Upcoming"];

categories.forEach(cat=>{

let movies=data.filter(m=>m.category===cat);

if(movies.length===0) return;

html+=`
<div class="section">
<h2>${cat}</h2>
<div class="row">
`;

movies.forEach(movie=>{
html+=`
<div class="card">
<img src="${movie.thumb_path}">
<h3>${movie.title}</h3>

<a href="javascript:void(0)" onclick="openAd('${movie.watch_url}')">
▶ Watch
</a>

</div>
`;
});

html+=`
</div>
</div>
`;

});

document.getElementById("content").innerHTML=html;

});

</script>

</body>
</html>
