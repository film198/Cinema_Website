<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA 198 | 2026 Movies</title>
    <style>
        body { margin: 0; background: #080808; color: white; font-family: sans-serif; text-align: center; }
        header { padding: 50px; background: linear-gradient(to bottom, #1a1a1a, #080808); }
        h1 { color: #e50914; font-size: 3rem; margin: 0; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .movie-card { background: #111; border: 1px solid #333; border-radius: 10px; padding: 10px; }
        .movie-card img { width: 100%; border-radius: 5px; height: 350px; object-fit: cover; }
        .watch-btn { background: #e50914; color: white; padding: 10px 20px; text-decoration: none; display: inline-block; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>CINEMA 198</h1>
        <p>Your portal to 2026 Cinema</p>
    </header>
    <div id="movies-grid" class="container">
        <p style="color: #666;">🎬 Preparing the English movie list...</p>
    </div>
    <script>
        async function load() {
            try {
                const r = await fetch('movies.json?v=' + Date.now());
                const data = await r.json();
                const grid = document.getElementById('movies-grid');
                if (data.length > 0) {
                    grid.innerHTML = data.map(m => `
                        <div class="movie-card">
                            <img src="${m.thumb_path}">
                            <h3>${m.title}</h3>
                            <a href="${m.url}" target="_blank" class="watch-btn">Watch Now</a>
                        </div>
                    `).join('');
                }
            } catch(e) { console.log("Waiting for data..."); }
        }
        load();
    </script>
</body>
</html>
