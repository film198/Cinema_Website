<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema 198</title>

<style>

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

/* ===== HERO ===== */

.hero{
height:90vh;
background:linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.4)),
url("images/default.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
animation:fadeIn 2s ease-in-out;
}

.hero h1{
font-size:60px;
max-width:600px;
}

.hero p{
max-width:500px;
margin:20px 0;
opacity:0.8;
}

.hero button{
padding:12px 30px;
border:none;
background:#e50914;
color:white;
font-size:18px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
}

.hero button:hover{
background:#ff1e2d;
transform:scale(1.1);
}

/* ===== SECTION ===== */

.section{
padding:40px 60px;
}

.section h2{
margin-bottom:20px;
}

/* ===== MOVIE ROW ===== */

.row{
display:flex;
gap:20px;
overflow-x:auto;
scroll-behavior:smooth;
}

.row::-webkit-scrollbar{
display:none;
}

/* ===== CARD ===== */

.card{
min-width:220px;
background:#181818;
border-radius:15px;
overflow:hidden;
transition:0.4s;
position:relative;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 20px red;
}

.card h3{
padding:10px;
font-size:16px;
}

.card button{
position:absolute;
bottom:10px;
left:10px;
right:10px;
padding:8px;
border:none;
background:red;
color:white;
border-radius:5px;
opacity:0;
transition:0.3s;
cursor:pointer;
}

.card:hover button{
opacity:1;
}

/* ===== ANIMATION ===== */

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
<h1>Experience Cinema Like Never Before</h1>
<p>Watch the latest movies and trending content in high quality.</p>
<button onclick="scrollToMovies()">▶ Explore Movies</button>
</div>

<div id="content"></div>

<script>

fetch("movies.json?v="+Date.now())
.then(res=>res.json())
.then(data=>{

let html="";

let categories=["Popular","Top Rated","Upcoming"];

categories.forEach(cat=>{

let movies=data.filter(m=>m.category===cat);

html+=`
<div class="section">
<h2>${cat}</h2>
<div class="row">
`;

movies.forEach(movie=>{
html+=`
<div class="card">
<img src="${movie.thumb_path}">
<h3>${movie.title}</h3>
<button onclick="location.href='${movie.watch_url}'">
▶ Watch
</button>
</div>
`;
});

html+=`
</div>
</div>
`;

});

document.getElementById("content").innerHTML=html;

});

function scrollToMovies(){
window.scrollTo({top:700,behavior:"smooth"});
}

</script>

</body>
</html>
