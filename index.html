<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema 198</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

/* ================= HEADER ================= */

header{
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    background:#111;
    letter-spacing:2px;
}

/* ================= TABS ================= */

.tabs{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:20px;
    flex-wrap:wrap;
}

.tab{
    padding:10px 18px;
    background:#1f1f1f;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}

.tab:hover{
    background:#e50914;
}

.tab.active{
    background:#e50914;
}

/* ================= GRID ================= */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#181818;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.card-content{
    padding:10px;
    text-align:center;
}

.btn{
    display:inline-block;
    margin-top:8px;
    padding:6px 12px;
    background:#e50914;
    border-radius:20px;
    cursor:pointer;
    font-size:14px;
}

.category-title{
    padding:20px;
    font-size:20px;
    font-weight:bold;
    color:#e50914;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<header>CINEMA 198</header>

<!-- ================= TABS ================= -->

<div class="tabs" id="tabs"></div>

<!-- ================= CONTENT ================= -->

<div id="content"></div>

<script>

let moviesData = [];
let categories = [];

/* ================= تحميل البيانات ================= */

async function loadMovies(){
    const res = await fetch("movies.json?v=" + Date.now());
    moviesData = await res.json();

    categories = [...new Set(moviesData.map(m => m.category))];

    renderTabs();
    renderMovies(categories[0]);
}

/* ================= إنشاء الأزرار ================= */

function renderTabs(){

    const tabsDiv = document.getElementById("tabs");
    tabsDiv.innerHTML = "";

    categories.forEach((cat, index) => {

        const tab = document.createElement("div");
        tab.className = "tab";
        tab.innerText = cat;

        if(index === 0) tab.classList.add("active");

        tab.onclick = () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            renderMovies(cat);
        };

        tabsDiv.appendChild(tab);
    });
}

/* ================= عرض الأفلام ================= */

function renderMovies(category){

    const content = document.getElementById("content");
    content.innerHTML = "";

    const filtered = moviesData.filter(m => m.category === category);

    const title = document.createElement("div");
    title.className = "category-title";
    title.innerText = category;

    const grid = document.createElement("div");
    grid.className = "grid";

    filtered.forEach(movie => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${movie.thumb_path}" loading="lazy">
            <div class="card-content">
                <div>${movie.title}</div>
                <div class="btn" onclick="watchMovie('${movie.url}')">
                    ▶ Watch
                </div>
            </div>
        `;

        grid.appendChild(card);
    });

    content.appendChild(title);
    content.appendChild(grid);
}

/* ================= زر المشاهدة ================= */

function watchMovie(url){
    if(url && url !== "#"){
        window.open(url,"_blank");
    } else {
        alert("No streaming link available yet.");
    }
}

loadMovies();

</script>

<!-- ================= NEWSLETTER ================= -->
<div style="text-align:center;padding:40px;background:#111;">
<h2>📩 Subscribe for Latest Movies</h2>

<input type="email" id="emailInput"
placeholder="Enter your email"
style="padding:10px;width:250px;border-radius:20px;border:none;">

<button onclick="subscribe()"
style="padding:10px 20px;border:none;background:#e50914;color:white;border-radius:20px;cursor:pointer;">
Subscribe
</button>

<p id="msg"></p>
</div>

<script>

async function subscribe(){

let email = document.getElementById("emailInput").value;

let res = await fetch("api.php",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ email: email })
});

let data = await res.json();
document.getElementById("msg").innerText = data.message;
}

</script>


</body>
</html>
