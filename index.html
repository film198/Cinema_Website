<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CINEMA 198</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #e50914; }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .btn { background: #e50914; color: #fff; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .nav { margin: 20px; } .nav button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>CINEMA 198</h1>

    <div style="margin: 20px;">
        <script async="async" data-cfasync="false" src="https://pl28765302.effectivegatecpm.com/3686fda368f8c1f83ac7b63c48fce51a/invoke.js"></script>
        <div id="container-3686fda368f8c1f83ac7b63c48fce51a"></div>
    </div>

    <div id="grid" class="grid"></div>
    <div id="pagination" class="nav"></div>

    <script>
        const AD_URL = "https://www.effectivegatecpm.com/es8hkke7?key=f44396473515f3318c23f3ce36dbf199";
        let movies = [];
        
        async function init() {
            const res = await fetch('movies.json?v=' + Date.now());
            movies = await res.json();
            showPage(1);
        }

        function showPage(p) {
            const start = (p-1)*10;
            const items = movies.slice(start, start+10);
            document.getElementById('grid').innerHTML = items.map(m => `
                <div class="card">
                    <img src="${m.thumb_path}">
                    <h3>${m.title}</h3>
                    <button class="btn" onclick="go('${m.url}')">Watch Now</button>
                </div>
            `).join('');
            
            let navHtml = '';
            for(let i=1; i<=Math.ceil(movies.length/10); i++) {
                navHtml += `<button onclick="showPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = navHtml;
        }

        function go(u) {
            window.open(AD_URL, '_blank'); // فتح الإعلان الذكي
            setTimeout(() => { window.location.href = u; }, 400);
        }
        init();
    </script>

    <script src="https://pl28765325.effectivegatecpm.com/98/8b/fb/988bfb7031a8fc34a9558d4cd8fa6b99.js"></script>
</body>
</html>
